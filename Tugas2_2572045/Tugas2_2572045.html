<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #1e1f22;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    hr{
        border:none; border-top:1px solid #3f4147; margin-left:10px; margin-right:20px;}
    .kartu {
        width: 340px;
        border-radius: 10px;
        background-color: #2b2d31;
        margin: auto;
    }

    .banner {
        background-color: #4a7fa5;
        height: 80px;
        border-radius: 10px 10px 0 0;
    }

    .avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 4px solid #2b2d31;
        margin-top:-36px;
        margin-left:18px;
        line-height: 72px;
        text-align: center;
        font-size: 32px;
        background-color: lightgreen;
    }

    .nama {
        font-size: 18px;
        font-weight: bold;
        color: white;
        margin-top: 10px;
        margin-left: 17px;
    }

    .handle {
        font-size: 13px;
        color: #80848e;
        margin-left: 17px;
    }

    .label {
        color: #dbdee1;
        font-size: 14px;
        margin: 10px 20px 5px;
    }

    .isi {
        color: #80848e;
        margin: 0 20px 15px;
    }

    .tab-wrapper {
        border-top: 1px solid #3f4147;
        padding: 10px 20px;
    }

    .tab-aktif {
        font-weight: bold;
        color: white;
        border-bottom: 2px solid white;
        padding-bottom: 5px;
    }

    .recent {
        font-size: 11px;
        font-weight: bold;
        color: #b5bac1;
        margin: 0 20px 10px;
    }

    .game-item {
        background-color: #1e1f22;
        border-radius: 8px;
        padding: 10px;
        margin: 0 20px 10px;
    }
    img{
        width: 40px;
        height: 40px;
        border-radius: 6px;
        display: inline-block;
        line-height: 40px;
        text-align: center;
        font-weight: bold;
    }
    .game-ikon {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        display: inline-block;
        line-height: 40px;
        text-align: center;
        font-weight: bold;
    }

    .game-nama {
        font-weight:bold; color:#ffffff;margin-left:50px; margin-top:-40px
    }

    .game-waktu {
        font-size: 12px;
        color: #80848e;
        margin-left: 50px;
        display: inline-block;
    }
    </style>

</head>
<body>
    
    <div class="kartu">

        <div class="label">Note</div>

        </div>
        <div class="game-item">

        </div>

</body>
